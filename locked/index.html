<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="I am Nantungga Putra, an enthusiastic newcomer to the world of programming and web development, inspired to continually learn and enhance technical skills. This Homepage Portfolio features my latest projects around the front-end web development from several online courses including programming tech influencers. Thank you for exploring my website. I hope the provided information offers valuable insights." />
		<meta name="theme-color" content="#252525" />
		<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
		<meta http-equiv="Pragma" content="no-cache" />
		<meta http-equiv="Expires" content="0" />
		<meta property="og:title" content="Homepage Portfolio | Locked" />
		<meta property="og:description" content="I am Nantungga Putra, an enthusiastic newcomer to the world of programming and web development, inspired to continually learn and enhance technical skills. This Homepage Portfolio features my latest projects around the front-end web development from several online courses including programming tech influencers. Thank you for exploring my website. I hope the provided information offers valuable insights." />
		<meta property="og:image" content="../dist/img/nantunggaputra-background.webp" />
		<meta property="og:url" content="https://nantunggaputra.github.io/HTML/locked" />
		<link href="https://nantunggaputra.github.io/HTML/locked" rel="canonical" />
		<link href="./dist/output.css" rel="stylesheet" />
		<link href="../dist/img/favicon.ico" rel="icon" type="image/x-icon" />
		<link href="../dist/img/favicon.ico" rel="shortcut icon" type="image/x-icon" />
		<script src="https://cdn.jsdelivr.net/npm/feather-icons@4.29.1/dist/feather.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
		<script>
			if (localStorage.theme === "dark" || (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
				document.documentElement.classList.add("dark");
			} else {
				document.documentElement.classList.remove("dark");
			}
		</script>
		<title>Homepage Portfolio | Locked</title>
	</head>

	<body class="overflow-hidden bg-primary text-white dark:bg-dark">
		<!-- Lock_Screen_Overlay -->
		<div class="lockscreen-container">
			<div class="arc-section">
				<svg class="arc-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
					<g id="arcLines"></g>
				</svg>
				<div class="second-display">
					<span id="second" class="text-sm opacity-80 md:text-base">00</span>
				</div>
			</div>

			<div class="time-section">
				<div class="py-1 text-3xl font-light md:text-4xl" id="hour">00:00</div>
				<div class="text-sm opacity-80 md:text-base" id="date">Mar 15 2026</div>
				<div class="text-sm opacity-80 md:text-base" id="day">Sunday</div>
			</div>

			<div class="progress-section">
				<div class="progress-container">
					<svg class="progress-ring" width="140" height="140">
						<circle class="progress-ring-bg" cx="70" cy="70" r="60"></circle>
						<circle class="progress-ring-fill" id="progressCircle" cx="70" cy="70" r="60"></circle>
					</svg>
					<div class="progress-text"><span id="progressPercent">0</span>%</div>
				</div>
			</div>

			<div class="icons-section">
				<button onclick="goHome()" class="icon-btn">
					<i data-feather="home"></i>
				</button>
				<button onclick="shareScreen()" class="icon-btn">
					<i data-feather="share-2"></i>
				</button>
				<button id="copied" onclick="copyToClipboard()" class="icon-btn">
					<i data-feather="copy"></i>
				</button>
			</div>
		</div>

		<!-- Hidden_Game_Overlay -->
		<div class="game-overlay bg-primary text-white dark:bg-dark" id="gameOverlay">
			<div class="game-container">
				<div class="score-display">
					<div class="score-item text-sm opacity-80 md:text-base">Score: <span id="gameScore">0</span></div>
					<div class="score-item text-sm opacity-80 md:text-base">High Score: <span id="gameHighScore">0</span></div>
				</div>
				<canvas id="gameCanvas"></canvas>
				<div class="game-over hidden" id="gameOver">
					<div class="mb-4 text-base opacity-80 md:text-xl">
						Game Over! <nobr>Score: <span id="finalScore">0</span></nobr>
					</div>
					<button onclick="restartGame()" class="replay-btn"><i data-feather="rotate-cw" class="scale-75"></i> Replay</button>
				</div>
			</div>
			<button onclick="closeGame()" class="close-game-btn">
				<i data-feather="x"></i>
			</button>
		</div>

		<!-- Feather_Icons -->
		<script>
			feather.replace();
		</script>

		<!-- JavaScript -->
		<script src="./dist/js/script.js"></script>
	</body>
</html>
